apiVersion: v1
kind: Service
metadata:
  name: {{ include "workflow-engine.fullname" . }}
  labels:
    {{- include "workflow-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
  {{- if eq .Values.ingress.className "gce" }}
  annotations:
    # Required by GKE Ingress so the L7 LB does health checks against /health.
    cloud.google.com/backend-config: '{"default": "{{ include "workflow-engine.fullname" . }}"}'
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "workflow-engine.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: engine
