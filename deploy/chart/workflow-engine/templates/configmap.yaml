apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "workflow-engine.fullname" . }}-config
  labels:
    {{- include "workflow-engine.labels" . | nindent 4 }}
data:
  HOST: "0.0.0.0"
  PORT: {{ .Values.engine.port | quote }}
  WEB_DIST_DIR: "/app/public"
  {{- range $k, $v := .Values.engine.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
